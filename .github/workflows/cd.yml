# CD: deploy staging (on push to staging) and production (on push to main).
# Flow: develop → staging → main
# Merge develop into staging for staging deploy; merge staging into main for production deploy.
name: CD

on:
  push:
    branches: [staging, main]

jobs:
  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v6

      - name: Build (staging)
        run: |
          godot --headless --path . --quit
          # Add export for staging here, e.g.: godot --headless --path . --export-release "Staging" build.zip

      # Example: upload artifact for download or deploy to staging server
      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: staging-build
      #     path: build.zip

  deploy-production:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v6

      - name: Build (production)
        run: |
          godot --headless --path . --quit
          # Add export for production here, e.g.: godot --headless --path . --export-release "Windows Desktop" game.exe

      # Example: deploy to itch.io, Steam, or upload release
      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: release
      #     path: .
      # - name: Deploy to itch.io
      #   run: ...
      #   env:
      #     BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
