# CI: docs (Markdown lint + link check) and Godot project validation.
# Runs on push/PR to develop, staging, and main.
# Flow: develop → staging → main (branch-flow job blocks merges in the wrong direction).
name: CI

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]

jobs:
  branch-flow:
    name: Branch flow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop → staging → main
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          # main só pode receber de staging
          if [ "$BASE" = "main" ] && [ "$HEAD" != "staging" ]; then
            echo "::error::Só podes fazer merge para 'main' a partir de 'staging'. (head=$HEAD)"
            exit 1
          fi
          # staging só pode receber de develop
          if [ "$BASE" = "staging" ] && [ "$HEAD" != "develop" ]; then
            echo "::error::Só podes fazer merge para 'staging' a partir de 'develop'. (head=$HEAD)"
            exit 1
          fi
          # develop não pode receber de main nem de staging (evitar voltar atrás)
          if [ "$BASE" = "develop" ] && { [ "$HEAD" = "main" ] || [ "$HEAD" = "staging" ]; }; then
            echo "::error::Não podes fazer merge de '$HEAD' para 'develop'. Fluxo é develop → staging → main."
            exit 1
          fi
          echo "Branch flow OK: $HEAD → $BASE"

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          config: .markdownlint.yaml
          globs: "**/*.md"
          fix: false

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress '**/*.md'
          workingDirectory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  godot:
    name: Godot validate
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v6

      - name: Validate project
        run: godot --headless --path . --quit
